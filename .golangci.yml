run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  exclude-rules:
    # Allow intentional InsecureSkipVerify in TLS scanning code
    - linters:
        - govet
      text: "composites"
    - linters:
        - staticcheck
      text: "SA1019" # Allow deprecated functions where needed
  max-issues-per-linter: 50
  max-same-issues: 5
