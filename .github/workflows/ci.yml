name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::Go files must be formatted with gofmt"
            gofmt -d .
            exit 1
          fi

      - name: Validate Skills structure
        run: make validate-skills

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run tests
        run: go test -short -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "Total coverage: ${COVERAGE}"
          # Ensure at least 30% coverage (offline tests only)
          COVERAGE_NUM=$(echo "$COVERAGE" | sed 's/%//')
          if [ "$(echo "$COVERAGE_NUM < 30" | bc -l)" -eq 1 ]; then
            echo "::warning::Coverage is below 30%: ${COVERAGE}"
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build CLI
        run: go build -trimpath -ldflags "-s -w" -o cert-skills ./cmd/

      - name: Build MCP Server
        run: go build -trimpath -ldflags "-s -w" -o cert-skills-mcp ./cmd/mcp/

      - name: Verify binaries
        run: |
          ./cert-skills --version || echo "version: dev"
          ./cert-skills-mcp --help || true
